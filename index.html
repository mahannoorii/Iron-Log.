<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<meta name="theme-color" content="#0a0a08">
<title>Iron Log</title>
<style>
:root{
  --bg:#0a0a08;--bg2:#14140f;--bg3:#1a1a14;--bg4:#1f1f18;
  --bd:#2a2a20;--bd2:#3a3a2c;
  --t:#f5f1e0;--t2:#a8a497;--t3:#6a6660;--t4:#3a3a32;
  --g:#5fb37a;--gs:#7dd49a;--gbg:#0e2418;--gbd:#1f4a30;
  --o:#ffc647;--os:#ffd76e;--obg:#2a1f00;--obd:#4a3a08;
  --red:#d46060;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
html,body{background:var(--bg);color:var(--t);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:15px;min-height:100vh;overscroll-behavior:none;}
#app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:100px;}
.hdr{background:linear-gradient(180deg,#161611,#0a0a08);border-bottom:1px solid var(--bd);padding:16px 16px 14px;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;}
.brand{display:flex;align-items:center;gap:10px;}
.bmark{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#2a4a32,#1a3a22);border:1px solid #3a5a42;display:flex;align-items:center;justify-content:center;font-family:Impact,'Arial Narrow',sans-serif;font-size:20px;color:var(--gs);}
.btitle{font-family:Impact,'Arial Narrow',sans-serif;font-size:26px;letter-spacing:4px;line-height:1;}
.bsub{font-size:10px;color:var(--g);letter-spacing:2px;text-transform:uppercase;margin-top:3px;font-weight:600;}
.bkbtn{background:var(--bg4);border:1px solid var(--bd2);color:var(--t2);padding:9px 13px;border-radius:9px;font-size:11px;font-family:inherit;font-weight:700;cursor:pointer;letter-spacing:1px;display:flex;align-items:center;gap:5px;}
.bkbtn:active{transform:scale(0.95);}
.nav{display:flex;gap:4px;padding:4px;background:var(--bg2);border:1px solid var(--bd);border-radius:11px;margin-top:12px;}
.nbtn{flex:1;padding:10px 0;border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:1.5px;cursor:pointer;border:none;background:transparent;color:var(--t4);}
.nbtn.on{background:var(--g);color:#0a1a0e;}
.qbar{padding:14px 16px 12px;border-bottom:1px solid var(--bd);}
.qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.qbtn{padding:13px 0;border-radius:11px;font-family:Impact,'Arial Narrow',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--t3);text-align:center;}
.qbtn:active{transform:scale(0.95);}
.qdts{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:9px;letter-spacing:1px;color:var(--t4);margin-top:3px;font-weight:500;display:block;}
.qbtn.on{color:#fff;}
.qbtn.on .qdts{color:rgba(255,255,255,0.65);}
.qbtn.q1.on{background:#4a8a5e;border-color:#4a8a5e;}
.qbtn.q2.on{background:#3a7aa0;border-color:#3a7aa0;}
.qbtn.q3.on{background:#c87a3c;border-color:#c87a3c;}
.qbtn.q4.on{background:#a05a8a;border-color:#a05a8a;}
.wbar{padding:16px 16px 12px;border-bottom:1px solid var(--bd);}
.slbl{font-size:11px;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase;margin-bottom:10px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.winfo{font-size:10px;color:var(--t4);font-family:'Courier New',monospace;}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.wbtn{aspect-ratio:1;min-height:40px;border-radius:9px;font-family:Impact,'Arial Narrow',sans-serif;font-size:17px;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--t3);display:flex;align-items:center;justify-content:center;position:relative;}
.wbtn:active{transform:scale(0.93);}
.wbtn.hd{background:var(--bg4);color:var(--t2);border-color:var(--bd2);}
.wbtn.hd::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--g);}
.wbtn.dim{opacity:0.4;}
.wbtn.on{color:#fff;}
.wbtn.on::after{background:#fff!important;opacity:0.7;}
.wbtn.on.q1{background:#4a8a5e;border-color:#4a8a5e;}
.wbtn.on.q2{background:#3a7aa0;border-color:#3a7aa0;}
.wbtn.on.q3{background:#c87a3c;border-color:#c87a3c;}
.wbtn.on.q4{background:#a05a8a;border-color:#a05a8a;}
.dtabs{display:flex;gap:7px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--bd);}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;padding:11px 16px;border-radius:11px;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--t3);white-space:nowrap;min-height:46px;display:flex;align-items:center;gap:7px;}
.dtab:active{transform:scale(0.95);}
.dnum{font-family:Impact,'Arial Narrow',sans-serif;font-size:17px;opacity:0.65;}
.dtab.on{color:#fff;}
.dtab.on .dnum{opacity:1;}
.pbanner{margin:14px 16px 0;padding:13px 15px;border-radius:13px;background:var(--bg2);display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bd);position:relative;overflow:hidden;}
.ptag{font-family:Impact,'Arial Narrow',sans-serif;font-size:15px;letter-spacing:2.5px;line-height:1;}
.pwk{font-size:11px;color:var(--t3);margin-top:4px;font-family:'Courier New',monospace;}
.ptip{font-size:11px;color:var(--t3);text-align:right;max-width:155px;line-height:1.45;}
.pref{margin:12px 16px 0;background:var(--bg2);border-radius:13px;overflow:hidden;border:1px solid var(--bd);}
.ptitle{padding:11px 15px 9px;font-size:11px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.prow{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;border-bottom:1px solid #161610;}
.prow:last-child{border-bottom:none;}
.pname{font-size:13px;color:var(--t2);flex:1;font-weight:500;}
.pbest{font-size:13px;color:var(--t2);font-weight:700;font-family:'Courier New',monospace;}
.pempty{padding:13px 15px;text-align:center;font-size:12px;color:var(--t4);font-style:italic;}
.cards{padding:16px;display:flex;flex-direction:column;gap:12px;}
.card{border-radius:16px;overflow:hidden;border:1px solid var(--bd);background:var(--bg2);}
.card.traps{background:linear-gradient(180deg,#112418,#14140f);border-color:#2a4a30;}
.card.abs{background:linear-gradient(180deg,#1d1226,#14140f);border-color:#3a2848;}
.card.lg{background:linear-gradient(180deg,#1f1a0e,#14140f);border-color:#3a3018;}
.chdr{padding:14px 16px 11px;border-bottom:1px solid var(--bd);}
.exnm{font-family:Impact,'Arial Narrow',sans-serif;font-size:21px;letter-spacing:0.5px;color:var(--t);line-height:1.1;}
.exmeta{display:flex;gap:9px;align-items:center;margin-top:7px;flex-wrap:wrap;}
.exnt{font-size:11px;color:var(--t3);font-style:italic;flex:1;}
.btag{font-size:9px;padding:2px 6px;border-radius:4px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;}
.btag.tr{background:#1f3a26;color:var(--gs);}
.btag.ab{background:#2a1a3a;color:#c8a8e8;}
.btag.lg{background:#3a2e14;color:#e8c87a;}
.vrow{display:flex;padding:10px 16px 12px;gap:6px;border-bottom:1px solid var(--bd);}
.vbtn{flex:1;padding:9px 6px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--bg4);color:var(--t3);font-family:inherit;letter-spacing:0.5px;text-align:center;}
.vbtn:active{transform:scale(0.97);}
.vbtn.on{color:#fff;border-color:transparent;}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bd);gap:1px;}
.scol{padding:12px 7px 10px;background:var(--bg2);}
.card.traps .scol{background:#131e16;}
.card.abs .scol{background:#1a1024;}
.card.lg .scol{background:#1a160c;}
.scol.dis{background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;color:var(--t4);font-size:16px;min-height:90px;}
.scol.fail{background:linear-gradient(180deg,var(--bg2),rgba(212,96,96,0.05));}
.card.traps .scol.fail{background:linear-gradient(180deg,#131e16,rgba(212,96,96,0.06));}
.card.abs .scol.fail{background:linear-gradient(180deg,#1a1024,rgba(212,96,96,0.06));}
.card.lg .scol.fail{background:linear-gradient(180deg,#1a160c,rgba(212,96,96,0.06));}
.slb2{font-size:10px;color:var(--t3);text-align:center;margin-bottom:7px;letter-spacing:1.5px;font-weight:700;font-family:Impact,'Arial Narrow',sans-serif;display:flex;align-items:center;justify-content:center;gap:3px;}
.slb2.f{color:var(--red);}
.sinp{width:100%;background:var(--bg4);border:1px solid var(--bd);color:var(--t);font-size:14px;font-weight:600;padding:11px 3px;outline:none;text-align:center;font-family:'Courier New',monospace;border-radius:9px;min-height:44px;}
.sinp::placeholder{color:var(--t4);font-size:10px;font-weight:400;}
.sinp:focus{border-color:var(--g);background:#1a2418;box-shadow:0 0 0 3px rgba(95,179,122,0.15);}
.sinp.hv{border-color:var(--bd2);}
.sinp.pw{color:var(--os);border-color:var(--o);background:var(--obg);font-weight:700;}
.sinp.pr{color:var(--gs);border-color:var(--g);background:var(--gbg);font-weight:700;}
.prl{font-size:8px;text-align:center;margin-top:5px;font-weight:800;letter-spacing:1px;font-family:Impact,'Arial Narrow',sans-serif;padding:2px 3px;border-radius:3px;}
.prl.w{color:var(--os);background:rgba(255,198,71,0.1);}
.prl.r{color:var(--gs);background:rgba(95,179,122,0.1);}
.toast{position:fixed;top:max(20px,env(safe-area-inset-top,20px));left:50%;transform:translateX(-50%) translateY(-100px);background:linear-gradient(135deg,var(--os),var(--o));color:#1a1200;padding:13px 24px;border-radius:50px;font-family:Impact,'Arial Narrow',sans-serif;font-size:16px;letter-spacing:2px;z-index:9999;white-space:nowrap;box-shadow:0 8px 30px rgba(255,198,71,0.5);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.rep{background:linear-gradient(135deg,var(--gs),var(--g));color:#062012;box-shadow:0 8px 30px rgba(95,179,122,0.5);}
.logtip{padding:14px 16px;font-size:11px;color:var(--t3);text-align:center;line-height:1.7;}
.trhdr{padding:18px 16px 10px;border-bottom:1px solid var(--bd);}
.trtitle{font-family:Impact,'Arial Narrow',sans-serif;font-size:30px;letter-spacing:3px;line-height:1;}
.trsub{font-size:12px;color:var(--t3);margin-top:5px;}
.trctrl{display:flex;gap:7px;margin-top:12px;}
.trflt{padding:7px 13px;border-radius:7px;background:var(--bg2);border:1px solid var(--bd);color:var(--t3);font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:inherit;}
.trflt.on{background:var(--g);color:#0a1a0e;border-color:var(--g);}
.sumbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;padding:14px 16px 8px;}
.sumc{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:16px 8px;text-align:center;position:relative;overflow:hidden;}
.sumc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sumc.a::before{background:var(--t2);}
.sumc.b::before{background:var(--g);}
.sumc.c::before{background:var(--o);}
.snum{font-family:Impact,'Arial Narrow',sans-serif;font-size:30px;line-height:1;}
.slbl3{font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:6px;font-weight:700;}
.tcards{padding:6px 16px 18px;}
.dslbl{font-family:Impact,'Arial Narrow',sans-serif;font-size:15px;letter-spacing:3px;text-transform:uppercase;padding:14px 0 7px;display:flex;align-items:center;gap:10px;}
.dslbl::after{content:'';flex:1;height:1px;background:var(--bd);}
.tc{background:var(--bg2);border-radius:14px;border:1px solid var(--bd);margin-bottom:10px;overflow:hidden;border-top-width:3px;}
.tchdr{padding:13px 14px 11px;display:flex;justify-content:space-between;align-items:flex-start;gap:9px;border-bottom:1px solid var(--bd);}
.tcnm{font-family:Impact,'Arial Narrow',sans-serif;font-size:17px;letter-spacing:1px;flex:1;line-height:1.15;}
.tbdgs{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.tbdg{font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;font-family:'Courier New',monospace;}
.tbdg.w{background:var(--obg);color:var(--os);border:1px solid var(--obd);}
.tbdg.r{background:var(--gbg);color:var(--gs);border:1px solid var(--gbd);}
.twks{display:flex;overflow-x:auto;padding:10px 14px 12px;gap:5px;}
.twks::-webkit-scrollbar{display:none;}
.twk{flex-shrink:0;width:58px;min-height:62px;border-radius:9px;padding:7px 3px;text-align:center;border:1px solid var(--bd);background:var(--bg4);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.twk.em{background:rgba(0,0,0,0.3);border-color:#161610;}
.twk.pw{background:var(--obg);border-color:var(--o);}
.twk.pr{background:var(--gbg);border-color:var(--g);}
.twl{font-size:9px;color:var(--t3);letter-spacing:1.5px;margin-bottom:3px;font-family:Impact,'Arial Narrow',sans-serif;}
.twwt{font-family:'Courier New',monospace;font-size:13px;font-weight:700;line-height:1;}
.twrp{font-size:10px;color:var(--t3);margin-top:2px;font-family:'Courier New',monospace;}
.twst{font-size:8px;margin-top:2px;font-family:Impact,'Arial Narrow',sans-serif;}
.twem{font-size:14px;color:var(--t4);margin-top:3px;}
.tnd{font-size:12px;color:var(--t3);padding:13px 14px 15px;font-style:italic;text-align:center;}
.ycard{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.yqhdr{padding:14px 16px 11px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.yqtitle{font-family:Impact,'Arial Narrow',sans-serif;font-size:22px;letter-spacing:3px;}
.yqdates{font-size:11px;color:var(--t3);margin-top:3px;font-family:'Courier New',monospace;}
.yvbtn{background:var(--bg4);border:1px solid var(--bd2);color:var(--t2);padding:7px 12px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:inherit;}
.ystats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;background:var(--bd);gap:1px;}
.ystat{background:var(--bg2);padding:13px 6px;text-align:center;}
.ysnum{font-family:Impact,'Arial Narrow',sans-serif;font-size:22px;line-height:1;}
.yslbl{font-size:9px;color:var(--t3);letter-spacing:1.5px;margin-top:3px;font-weight:700;}
.safe{height:env(safe-area-inset-bottom,14px);}
/* Rest timer */
.rtfab{position:fixed;right:16px;bottom:calc(20px + env(safe-area-inset-bottom,0px));width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#2a4a32,#1a3a22);border:1px solid #3a5a42;color:var(--gs);font-size:24px;cursor:pointer;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;}
.rtfab:active{transform:scale(0.92);}
.rtfab.run{background:linear-gradient(135deg,#3a6a44,#2a5232);animation:rtpulse 1s ease-in-out infinite;font-size:16px;font-weight:800;font-family:'Courier New',monospace;font-variant-numeric:tabular-nums;}
.rtfab.done{background:linear-gradient(135deg,#5a4a1a,#3a2e0e);color:var(--os);border-color:#5a4a1a;animation:rtdone 0.6s ease-in-out infinite;font-size:15px;font-weight:700;}
@keyframes rtdone{0%,100%{box-shadow:0 4px 16px rgba(255,198,71,0.4);}50%{box-shadow:0 4px 28px rgba(255,198,71,0.9);}}
@keyframes rtpulse{0%,100%{box-shadow:0 4px 16px rgba(95,179,122,0.3);}50%{box-shadow:0 4px 24px rgba(95,179,122,0.7);}}
.rtmodal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;}
.rtbox{background:var(--bg2);border:1px solid var(--bd2);border-radius:20px;padding:28px 24px;max-width:340px;width:100%;text-align:center;}
.rttime{font-family:Impact,'Arial Narrow',sans-serif;font-size:72px;line-height:1;color:var(--gs);letter-spacing:2px;margin:8px 0 20px;font-variant-numeric:tabular-nums;}
.rttime.done{color:var(--os);}
.rtpresets{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.rtpre{padding:14px 0;border-radius:11px;background:var(--bg4);border:1px solid var(--bd);color:var(--t2);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.rtpre:active{transform:scale(0.95);}
.rtpre.on{background:var(--g);color:#0a1a0e;border-color:var(--g);}
.rtctrl{display:flex;gap:8px;}
.rtbtn{flex:1;padding:14px;border-radius:11px;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;border:none;}
.rtbtn.start{background:var(--g);color:#0a1a0e;}
.rtbtn.stop{background:#3a2020;color:var(--red);border:1px solid #4a2a2a;}
.rtbtn.close{background:var(--bg4);color:var(--t2);border:1px solid var(--bd2);}
/* Bodyweight */
.bwcard{margin:14px 16px 0;background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:14px 16px;}
.bwrow{display:flex;align-items:center;gap:12px;}
.bwlbl{font-size:11px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;font-weight:700;flex:1;}
.bwinp{width:90px;background:var(--bg4);border:1px solid var(--bd2);color:var(--t);font-size:16px;font-weight:700;padding:9px 10px;border-radius:9px;outline:none;text-align:center;font-family:'Courier New',monospace;}
.bwinp:focus{border-color:var(--g);}
.bwunit{font-size:13px;color:var(--t3);font-weight:600;}
@media(max-width:375px){.wgrid{grid-template-columns:repeat(6,1fr);}.wbtn{font-size:15px;min-height:36px;}.exnm{font-size:18px;}.sinp{font-size:13px;}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
// ── PROGRAM ─────────────────────────────────────────────────
// vars: array of variation labels. omit for single-variant exercises.
const PROG=[
  {id:'push',lb:'DAY 1',nm:'PUSH + HAMS',sub:'Chest · Triceps · Hamstrings',c:'#4a8a5e',ex:[
    {id:'incline_press',nm:'Incline Chest Press',  s:4,nt:'Main compound',vars:['DB','Smith/Machine']},
    {id:'cable_fly',    nm:'Cable Fly / Pec Deck', s:3,nt:'Full stretch, squeeze',vars:['Cable Fly','Pec Deck']},
    {id:'tri_pushdown', nm:'Triceps Pushdown',     s:3,nt:'Single hand cable, elbows fixed',vars:['Single Handle','Bar Attachment']},
    {id:'tri_overhead', nm:'Overhead Triceps Ext', s:3,nt:'Long head stretch, slow eccentric'},
    {id:'leg_curl',  nm:'Leg Curl',                s:3,nt:'Superset between push sets — hamstrings',lg:1},
  ]},
  {id:'pull',lb:'DAY 2',nm:'PULL + QUADS',sub:'Back · Biceps · Quads',c:'#3a7aa0',ex:[
    {id:'lat_pull',  nm:'Lat Pulldown',            s:4,nt:'Full stretch at top'},
    {id:'cable_row', nm:'Seated Cable Row',        s:3,nt:'Drive elbows back, full contraction'},
    {id:'ez_curl',   nm:'Bicep Curl',              s:3,nt:'Supinate at top, strict form',vars:['EZ-Bar','DB']},
    {id:'hammer_curl',nm:'DB Hammer Curl',         s:2,nt:'Both sets to failure — neutral grip',allFail:1},
    {id:'leg_ext',   nm:'Leg Extension',           s:3,nt:'Superset between pull sets — quads',lg:1},
  ]},

function wkRange(w){const s=wkStart(w),e=new Date(s);e.setDate(e.getDate()+6);return fmt(s)+'-'+fmt(e);}

function parse(v){if(!v||!v.trim()||v==='--')return null;const s=v.trim();if(s.indexOf(',')>=0&&s.indexOf('.')<0)return null;const m=s.match(/(\d+(?:\.\d+)?)\s*(?:kg)?\s*[xX\u00d7]\s*(\d+)/);return m?{w:parseFloat(m[1]),r:parseInt(m[2])}:null;}

  if(cur.w>overallBest.w)return{t:'WT',d:'+'+(+(cur.w-overallBest.w).toFixed(2))+'kg'};

  const sameWeight=parsed.filter(p=>p.w===cur.w);
  if(sameWeight.length){

// Healing pass: clean empty variant slots
(function healData(){
  let changed=false;
  for(const w of Object.keys(DATA)){
    if(!DATA[w]||typeof DATA[w]!=='object')continue;
    for(const exId of Object.keys(DATA[w])){
      const ex=DATA[w][exId];
      if(!ex||typeof ex!=='object')continue;
      // Detect old format (no variant nesting): {0:"60kg x6", 1:"60kg x6"...}
      // vs new format: {0:{0:"60kg x6"...}, 1:{...}}
      const firstKey=Object.keys(ex)[0];
      if(firstKey!==undefined&&typeof ex[firstKey]==='string'){
        // Old format detected — wrap in variant 0
        DATA[w][exId]={'0':{...ex}};
        changed=true;
        continue;
      }
      // Remove empty variant slots
      for(const vi of Object.keys(ex)){
        const sets=ex[vi];
        if(!sets||typeof sets!=='object'){delete ex[vi];changed=true;continue;}
        const hasAny=Object.values(sets).some(v=>v&&v.toString().trim());
        if(!hasAny){delete ex[vi];changed=true;}
      }
      if(!Object.keys(ex).length){delete DATA[w][exId];changed=true;}
    }
    if(!Object.keys(DATA[w]).length){delete DATA[w];changed=true;}
  }
  if(changed){try{localStorage.setItem(KEY,JSON.stringify(DATA));}catch{}}
})();

// One-time migration: split tri_pushdown into Single Handle (var 0) vs Bar Attachment (var 1)
(function migrateTriPushdown(){
  const FLAG='ironlog_v6_tripushdown_split';
  if(localStorage.getItem(FLAG)==='1')return;
  let changed=false;

    if(!DATA[w]||!DATA[w].tri_pushdown||!DATA[w].tri_pushdown['0'])continue;
    const sets=DATA[w].tri_pushdown['0'];
    const newVar0={},newVar1={};
    for(const si of Object.keys(sets)){
      const val=sets[si];
      const mm=val&&val.match(/(\d+(?:\.\d+)?)/);
      if(!mm)continue;
      const wt=parseFloat(mm[1]);
      if(wt<18)newVar0[si]=val;
      else newVar1[si]=val;
    }
    const newEx={};
    if(Object.keys(newVar0).length)newEx['0']=newVar0;
    if(Object.keys(newVar1).length)newEx['1']=newVar1;
    if(Object.keys(newEx).length)DATA[w].tri_pushdown=newEx;
    else delete DATA[w].tri_pushdown;
    changed=true;
  }
  if(changed){try{localStorage.setItem(KEY,JSON.stringify(DATA));}catch{}}
  try{localStorage.setItem(FLAG,'1');}catch{}
})();

// Get the variation index used for a (week, exId)
// If user manually set one this session, use that. Otherwise infer from data.
function getVar(w,exId,hasVars){
  if(!hasVars)return 0;
  // PRIORITY 1: if data exists for this week, use the variant that actually has data
  if(DATA[w]&&DATA[w][exId]){
    const keys=Object.keys(DATA[w][exId]).filter(k=>{
      const sets=DATA[w][exId][k];
      return sets&&Object.values(sets).some(v=>v);
    });
    if(keys.length===1)return parseInt(keys[0]);
    if(keys.length>1){
      // Multiple variants have data — prefer CURVAR if it points to one of them
      if(CURVAR[w]&&CURVAR[w][exId]!==undefined&&keys.includes(String(CURVAR[w][exId])))return CURVAR[w][exId];
      return parseInt(keys[0]);
    }
  }
  // PRIORITY 2: no data yet — use CURVAR if set, else default to 0
  if(CURVAR[w]&&CURVAR[w][exId]!==undefined)return CURVAR[w][exId];
  return 0;
}
function setVar(w,exId,vi){if(!CURVAR[w])CURVAR[w]={};CURVAR[w][exId]=vi;svV();}

// Get a set value
function gv(w,exId,vi,si){
  return(DATA[w]&&DATA[w][exId]&&DATA[w][exId][vi]&&DATA[w][exId][vi][si])||'';
}

// Set a set value
function setV(w,exId,vi,si,val){
  // Defense-in-depth: always trim and treat empty as deletion
  val=(val==null?'':String(val).trim());
  if(!DATA[w])DATA[w]={};
  if(!DATA[w][exId])DATA[w][exId]={};
  if(!DATA[w][exId][vi])DATA[w][exId][vi]={};
  if(val){
    DATA[w][exId][vi][si]=val;
  }else{
    delete DATA[w][exId][vi][si];
    if(!Object.keys(DATA[w][exId][vi]).length)delete DATA[w][exId][vi];
    if(!Object.keys(DATA[w][exId]).length)delete DATA[w][exId];
    if(!Object.keys(DATA[w]).length)delete DATA[w];
  }
  sv();
}

// Get prior values for the SAME variation
function priorValsVar(w,exId,vi,fallbackId){
  const a=[];
  // Collect IDs to scan — primary + optional fallback
  const ids=[exId];
  if(fallbackId&&fallbackId!==exId)ids.push(fallbackId);
  for(let i=1;i<w;i++){
    for(const id of ids){
      if(DATA[i]&&DATA[i][id]&&DATA[i][id][vi]){
        Object.values(DATA[i][id][vi]).forEach(v=>a.push(v));
      }
    }
  }
  return a;
}

// Last logged set for SAME variation (placeholder hint)
function lastSet(w,exId,vi,si,fallbackId){
  for(let i=w-1;i>=1;i--){
    const v=gv(i,exId,vi,si);
    if(v)return v;
    // Check fallback if no data for primary
    if(fallbackId&&fallbackId!==exId){
      const fv=gv(i,fallbackId,vi,si);
      if(fv)return fv;
    }
  }
  return null;
}

function rtBeep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    // three quick beeps
    [0,0.25,0.5].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=900;o.type='sine';
      g.gain.setValueAtTime(0.0001,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.35,ctx.currentTime+t+0.02);
      o.start(ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+t+0.18);
      o.stop(ctx.currentTime+t+0.2);
    });

}

function rEdit(app){
  const d=PROG[CD];
  app.innerHTML+=`<div style="padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center"><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gs)">EDIT EXERCISES</div><button onclick="saveEdit()" style="background:var(--g);border:none;color:#0a1a0e;padding:9px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px">SAVE ALL</button></div>`;
  let dt='';PROG.forEach((pd,i)=>{const on=i===CD,st=on?`background:${pd.c};border-color:${pd.c}`:'';dt+=`<button class="dtab${on?' on':''}" style="${st}" onclick="selD(${i})"><span class="dnum">${pd.lb.split(' ')[1]}</span>${pd.nm}</button>`;});
  app.innerHTML+=`<div class="dtabs">${dt}</div>`;
  let h='<div class="cards">';
  d.ex.forEach((e,ei)=>{
    const cc=e.tr?'traps':e.ab?'abs':e.lg?'lg':'';
    const curNm=(CUSTOM[d.id]&&CUSTOM[d.id][e.id]&&CUSTOM[d.id][e.id].nm)||e.nm;
    const curNt=(CUSTOM[d.id]&&CUSTOM[d.id][e.id]&&CUSTOM[d.id][e.id].nt)||e.nt;
    const isCust=CUSTOM[d.id]&&CUSTOM[d.id][e.id];
    h+=`<div class="card ${cc}"><div style="padding:14px 16px">
      <div style="font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:700;display:flex;justify-content:space-between;align-items:center"><span>Exercise Name</span>${isCust?`<button onclick="resetEx(${CD},${ei})" style="background:none;border:none;color:var(--red);font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:1px;padding:0">↩ Reset</button>`:''}</div>
      <input id="en_${d.id}_${e.id}" type="text" value="${esc(curNm)}" style="width:100%;background:var(--bg4);border:1px solid var(--bd2);color:var(--t);font-size:15px;font-weight:600;padding:11px 12px;border-radius:9px;outline:none;font-family:inherit;margin-bottom:10px;"/>
      <div style="font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:700">Notes / Cue</div>
      <input id="et_${d.id}_${e.id}" type="text" value="${esc(curNt)}" style="width:100%;background:var(--bg4);border:1px solid var(--bd2);color:var(--t2);font-size:13px;padding:10px 12px;border-radius:9px;outline:none;font-family:inherit;font-style:italic;"/>
    </div></div>`;
  });
  h+=`</div><div style="padding:14px 16px;display:flex;gap:10px"><button onclick="cancelEdit()" style="flex:1;background:var(--bg4);border:1px solid var(--bd2);color:var(--t2);padding:14px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px">CANCEL</button><button onclick="saveEdit()" style="flex:2;background:var(--g);border:none;color:#0a1a0e;padding:14px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px">SAVE ALL CHANGES</button></div>`;
  app.innerHTML+=h;
}

function rLog(app){
  rQB(app);
  const[qs,qe]=qWks(CQ);
  if(CW<qs||CW>qe)CW=qs;
  const day=PROG[CD],exList=getExList(CD);

  let wb='';for(let w=qs;w<=qe;w++){const q=wkQ(w),on=w===CW?'on':'',hd=wkHas(w)?'hd':'',dim=w>TWK?'dim':'';wb+=`<button class="wbtn ${on}${on?' q'+q:''} ${hd} ${dim}" onclick="selW(${w})">${w}</button>`;}
  app.innerHTML+=`<div class="wbar"><div class="slbl"><span>Week · ${QI[CQ].lb}</span><span class="winfo">${wkRange(CW)}</span></div><div class="wgrid">${wb}</div></div>`;

  let dt='';PROG.forEach((d,i)=>{const on=i===CD,st=on?`background:${d.c};border-color:${d.c}`:'';dt+=`<button class="dtab${on?' on':''}" style="${st}" onclick="selD(${i})"><span class="dnum">${d.lb.split(' ')[1]}</span>${d.nm}</button>`;});
  app.innerHTML+=`<div class="dtabs">${dt}</div>`;
  app.innerHTML+=`<div style="padding:8px 16px;border-bottom:1px solid var(--bd);display:flex;gap:8px"><button onclick="enterEdit()" style="flex:1;background:var(--bg4);border:1px solid var(--bd2);color:var(--t3);padding:10px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1.5px;display:flex;align-items:center;justify-content:center;gap:6px"><span style="font-size:13px">✏</span> EDIT NAMES</button><button onclick="showDebug()" style="background:var(--bg4);border:1px solid var(--bd2);color:var(--t3);padding:10px 14px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1.5px">🔍 DEBUG</button></div>`;

  const isCur=CW===TWK,isPast=CW<TWK,sc=isCur?'#5fb37a':isPast?'#a8a497':'#6a6660',sl=isCur?'CURRENT WEEK':isPast?'PAST WEEK':'UPCOMING',tip=isCur?"Beat last week's numbers":isPast?'Review your session':'Plan ahead';
  app.innerHTML+=`<div class="pbanner"><div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${sc};border-radius:0 4px 4px 0"></div><div style="padding-left:8px"><div class="ptag" style="color:${sc}">${sl}</div><div class="pwk">WEEK ${String(CW).padStart(2,'0')} / 52 · ${wkRange(CW)}</div></div><div class="ptip">${tip}</div></div>`;

  // Bodyweight input for this week
  const bwVal=BW[CW]!==undefined?BW[CW]:'';
  let bwTrend='';
  // Find most recent prior bodyweight for a delta
  for(let i=CW-1;i>=1;i--){if(BW[i]!==undefined){const d=+(((BW[CW]||BW[i])-BW[i]).toFixed(1));if(bwVal!==''&&d!==0)bwTrend=`<span style="font-size:11px;color:${d>0?'var(--os)':'var(--gs)'};font-weight:700">${d>0?'+':''}${d}kg</span>`;break;}}
  app.innerHTML+=`<div class="bwcard"><div class="bwrow"><span class="bwlbl">Bodyweight</span>${bwTrend}<input class="bwinp" type="text" inputmode="decimal" autocomplete="off" placeholder="—" value="${bwVal}" onchange="hiBW(this.value)" onfocus="this.select()"/><span class="bwunit">kg</span></div></div>`;

  // CARDS
  let cards='<div class="cards">',abs=false;
  exList.forEach(e=>{
    if(e.ab&&!abs){abs=true;cards+=`<div style="display:flex;align-items:center;gap:10px;margin:6px 0 2px"><div style="flex:1;height:1px;background:#3a2848"></div><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:13px;letter-spacing:3px;color:#c8a8e8">ABS CIRCUIT</div><div style="flex:1;height:1px;background:#3a2848"></div></div>`;}
    const cc=e.tr?'traps':e.ab?'abs':e.lg?'lg':'',badge=e.tr?'<span class="btag tr">Traps</span>':e.ab?'<span class="btag ab">Abs</span>':e.lg?'<span class="btag lg">Legs</span>':'';

    // Determine current variation for this week
    const hasVars=!!e.vars;
    const vi=getVar(CW,e.id,hasVars);

    // Variation toggle row
    let varRow='';
    if(hasVars){
      varRow='<div class="vrow">';
      e.vars.forEach((label,idx)=>{
        const on=idx===vi;
        const style=on?`background:${day.c};border-color:${day.c}`:'';
        varRow+=`<button class="vbtn${on?' on':''}" style="${style}" onclick="selectVar(${CW},'${e.id}',${idx})">${label}</button>`;
      });
      varRow+='</div>';
    }

    let sets='<div class="sgrid">';
    for(let si=0;si<4;si++){
      if(si>=e.s){sets+='<div class="scol dis">-</div>';continue;}
      const val=gv(CW,e.id,vi,si);
      const p=parse(val);
      const pr=p?chkPR(p,priorValsVar(CW,e.id,vi,e.fallback)):null;
      const fail=e.allFail?true:(si===e.s-1);
      const ic=pr?(pr.t==='WT'?'sinp pw':'sinp pr'):val?'sinp hv':'sinp';
      const prl=pr?`<div class="prl ${pr.t==='WT'?'w':'r'}">★ ${pr.d}</div>`:'';
      let ph='kg×reps';
      if(!val){
        const h=lastSet(CW,e.id,vi,si,e.fallback);
        if(h)ph=h;
      }
      sets+=`<div class="scol${fail?' fail':''}"><div class="slb2${fail?' f':''}">S${si+1}${fail?' 🔥':''}</div><input class="${ic}" type="text" inputmode="text" autocomplete="off" placeholder="${esc(ph)}" value="${esc(val)}" onchange="hi('${e.id}',${vi},${si},this.value,${e.fallback?`'${e.fallback}'`:'undefined'})" onfocus="this.select()"/>${prl}</div>`;
    }
    sets+='</div>';

    cards+=`<div class="card ${cc}"><div class="chdr"><div class="exnm">${e.nm}</div><div class="exmeta">${badge}<span class="exnt">${e.nt}</span></div></div>${varRow}${sets}</div>`;
  });
  app.innerHTML+=cards+'</div>';
  app.innerHTML+=`<div class="logtip">🔥 last set to failure · <span style="color:var(--os)">★</span> wt PR · <span style="color:var(--gs)">★</span> rep PR · Toggle variation to switch weights</div>`;
}

function selectVar(w,exId,vi){
  setVar(w,exId,vi);
  rdr();
}

function rTr(app){
  app.innerHTML+=`<div class="trhdr"><div class="trtitle">PROGRESS</div><div class="trsub">Best set per week per variation · Scroll →</div><div class="trctrl"><button class="trflt${TS==='q'?' on':''}" onclick="setTS('q')">${QI[CQ].lb} Only</button><button class="trflt${TS==='y'?' on':''}" onclick="setTS('y')">Full Year</button></div></div>`;
  if(TS==='q')rQB(app);
  const[qs,qe]=TS==='q'?qWks(CQ):[1,52],wra=[];for(let w=qs;w<=qe;w++)wra.push(w);

  // Stats: count tracked/improved/PRs across all variations separately
  let prs=0,imp=0,tr=0;
  PROG.forEach(d=>d.ex.forEach(e=>{
    const variants=e.vars||[''];
    for(let vi=0;vi<variants.length;vi++){
      const wb=wra.map(w=>bestOf(getWkSets(w,e.id,vi,e.s)));
      const fl=wb.filter(Boolean);
      if(!fl.length)continue;
      tr++;
      const f=fl[0],l=fl[fl.length-1];
      if(l.w>f.w||l.r>f.r)imp++;
      wb.forEach((wd,wi)=>{if(!wd)return;const pr=wb.slice(0,wi).filter(Boolean).map(p=>p.w+'kg x'+p.r);if(chkPR(wd,pr))prs++;});
    }
  }));

  app.innerHTML+=`<div class="sumbar"><div class="sumc a"><div class="snum" style="color:var(--t)">${tr}</div><div class="slbl3">Tracked</div></div><div class="sumc b"><div class="snum" style="color:var(--gs)">${imp}</div><div class="slbl3">Improved</div></div><div class="sumc c"><div class="snum" style="color:var(--os)">${prs}</div><div class="slbl3">PRs Hit</div></div></div><div class="tcards">`;

  PROG.forEach(d=>{
    app.innerHTML+=`<div class="dslbl" style="color:${d.c}">${d.lb} — ${d.nm}</div>`;
    d.ex.forEach(e=>{
      const nm=(CUSTOM[d.id]&&CUSTOM[d.id][e.id]&&CUSTOM[d.id][e.id].nm)||e.nm;
      const variants=e.vars||[''];
      for(let vi=0;vi<variants.length;vi++){
        const wb=wra.map(w=>bestOf(getWkSets(w,e.id,vi,e.s)));
        const av=[];wra.forEach(w=>{for(let s=0;s<e.s;s++)av.push(gv(w,e.id,vi,s));});
        const ob=bestOf(av);
        const dispNm=variants[vi]?`${nm} — ${variants[vi]}`:nm;
        if(!ob)continue;  // Skip if no data for this variation
        const bdg=`<div class="tbdgs"><span class="tbdg w">${ob.w}kg</span><span class="tbdg r">×${ob.r}</span></div>`;
        let wh='<div class="twks">';
        wb.forEach((wd,wi)=>{const w=wra[wi],pr=wd?chkPR(wd,wb.slice(0,wi).filter(Boolean).map(p=>p.w+'kg x'+p.r)):null;if(!wd){wh+=`<div class="twk em"><div class="twl">W${w}</div><div class="twem">-</div></div>`;return;}const pc=pr?(pr.t==='WT'?'pw':'pr'):'',wc=pr?.t==='WT'?'var(--os)':pr?.t==='REP'?'var(--gs)':'var(--t)',rc=pr?(pr.t==='WT'?'#c8a000':'var(--g)'):'var(--t3)',st=pr?`<div class="twst" style="color:${pr.t==='WT'?'var(--os)':'var(--gs)'}">★${pr.d}</div>`:'';wh+=`<div class="twk ${pc}"><div class="twl">W${w}</div><div class="twwt" style="color:${wc}">${wd.w}</div><div class="twrp" style="color:${rc}">×${wd.r}</div>${st}</div>`;});
        wh+='</div>';
        app.innerHTML+=`<div class="tc" style="border-top-color:${d.c}"><div class="tchdr"><div class="tcnm">${dispNm}</div>${bdg}</div>${wh}</div>`;
      }
    });
  });
  app.innerHTML+='</div>';
}

function rYr(app){
  app.innerHTML+=`<div class="trhdr"><div class="trtitle">YEAR REVIEW</div><div class="trsub">2026 · Quarter by quarter</div></div>`;
  // Bodyweight trend
  const bwWeeks=Object.keys(BW).map(Number).sort((a,b)=>a-b);
  if(bwWeeks.length>=1){
    const first=BW[bwWeeks[0]],last=BW[bwWeeks[bwWeeks.length-1]];
    const delta=+((last-first).toFixed(1));
    const minBW=Math.min(...bwWeeks.map(w=>BW[w])),maxBW=Math.max(...bwWeeks.map(w=>BW[w]));
    const range=maxBW-minBW||1;
    // Build a mini sparkline using divs
    let spark='';
    const W=bwWeeks[bwWeeks.length-1],firstW=bwWeeks[0],span=(W-firstW)||1;
    bwWeeks.forEach(w=>{
      const pct=((BW[w]-minBW)/range)*100;
      const xpct=((w-firstW)/span)*100;
      spark+=`<div title="Wk${w}: ${BW[w]}kg" style="position:absolute;left:${xpct}%;bottom:${pct}%;width:7px;height:7px;border-radius:50%;background:var(--gs);transform:translate(-50%,50%);box-shadow:0 0 6px rgba(95,179,122,0.5)"></div>`;
    });
    app.innerHTML+=`<div style="margin:14px 16px 0;background:linear-gradient(135deg,#14201a,#14140f);border:1px solid var(--gbd);border-radius:14px;padding:16px"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px"><span style="font-size:11px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;font-weight:700">Bodyweight</span><span style="font-family:Impact,'Arial Narrow',sans-serif;font-size:24px;color:var(--gs)">${last}kg ${delta!==0?`<span style="font-size:13px;color:${delta>0?'var(--os)':'var(--gs)'}">${delta>0?'+':''}${delta}</span>`:''}</span></div><div style="position:relative;height:60px;margin-top:10px;border-bottom:1px solid var(--bd);border-left:1px solid var(--bd)">${spark}</div><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t4);margin-top:5px;font-family:'Courier New',monospace"><span>Wk${firstW}</span><span>${minBW}–${maxBW}kg</span><span>Wk${W}</span></div></div>`;
  }
  let h='<div style="padding:14px 16px 20px">';
  for(let q=1;q<=4;q++){
    const[qs,qe]=qWks(q),info=QI[q];let wl=0,prs=0,imp=0,tr=0;
    for(let w=qs;w<=qe;w++)if(wkHas(w))wl++;
    PROG.forEach(d=>d.ex.forEach(e=>{
      const variants=e.vars||[''];
      for(let vi=0;vi<variants.length;vi++){
        const wb=[];for(let w=qs;w<=qe;w++)wb.push(bestOf(getWkSets(w,e.id,vi,e.s)));
        const fl=wb.filter(Boolean);if(!fl.length)continue;
        tr++;const f=fl[0],l=fl[fl.length-1];if(l.w>f.w||l.r>f.r)imp++;
        wb.forEach((wd,wi)=>{if(!wd)return;if(chkPR(wd,wb.slice(0,wi).filter(Boolean).map(p=>p.w+'kg x'+p.r)))prs++;});
      }
    }));
    const tot=qe-qs+1,pct=Math.round(wl/tot*100);
    h+=`<div class="ycard" style="border-top:3px solid ${info.c}"><div class="yqhdr"><div><div class="yqtitle" style="color:${info.c}">${info.lb}</div><div class="yqdates">${info.dt} · Wks ${qs}-${qe}</div></div><button class="yvbtn" onclick="jmpQ(${q})">VIEW →</button></div><div class="ystats"><div class="ystat"><div class="ysnum" style="color:var(--t)">${wl}<span style="font-size:12px;color:var(--t3)">/${tot}</span></div><div class="yslbl">WEEKS</div></div><div class="ystat"><div class="ysnum" style="color:${info.c}">${pct}%</div><div class="yslbl">DONE</div></div><div class="ystat"><div class="ysnum" style="color:var(--gs)">${imp}</div><div class="yslbl">IMPROVED</div></div><div class="ystat"><div class="ysnum" style="color:var(--os)">${prs}</div><div class="yslbl">PRs</div></div></div></div>`;
  }
  let ywl=0,yprs=0,yimp=0,ytr=0;
  for(let w=1;w<=52;w++)if(wkHas(w))ywl++;
  PROG.forEach(d=>d.ex.forEach(e=>{
    const variants=e.vars||[''];
    for(let vi=0;vi<variants.length;vi++){
      const wb=[];for(let w=1;w<=52;w++)wb.push(bestOf(getWkSets(w,e.id,vi,e.s)));
      const fl=wb.filter(Boolean);if(!fl.length)continue;
      ytr++;const f=fl[0],l=fl[fl.length-1];if(l.w>f.w||l.r>f.r)yimp++;
      wb.forEach((wd,wi)=>{if(!wd)return;if(chkPR(wd,wb.slice(0,wi).filter(Boolean).map(p=>p.w+'kg x'+p.r)))yprs++;});
    }
  }));
  h+=`<div style="background:linear-gradient(135deg,#1a2a14,#14140f);border:1px solid var(--gbd);border-radius:13px;padding:16px;margin-top:6px"><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:18px;letter-spacing:3px;color:var(--gs);margin-bottom:12px;text-align:center">2026 TOTAL</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;text-align:center"><div><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:26px;color:var(--t)">${ywl}</div><div style="font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:3px;font-weight:700">WEEKS</div></div><div><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:26px;color:var(--t)">${ytr}</div><div style="font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:3px;font-weight:700">LIFTS</div></div><div><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:26px;color:var(--gs)">${yimp}</div><div style="font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:3px;font-weight:700">IMPROVED</div></div><div><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:26px;color:var(--os)">${yprs}</div><div style="font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:3px;font-weight:700">PRs</div></div></div></div></div>`;
  document.getElementById('app').innerHTML+=h;
}

function hi(exId,vi,si,val,fallbackId){
  setV(CW,exId,vi,si,val.trim());
  const p=parse(val.trim());
  if(p){const pr=chkPR(p,priorValsVar(CW,exId,vi,fallbackId));if(pr)showToast(pr.t,pr.d);}
  rdr();
}
function sw(v){VW=v;rdr();window.scrollTo({top:0,behavior:'smooth'});}
function selQ(q){CQ=q;const[qs,qe]=qWks(q);if(CW<qs||CW>qe)CW=qs;rdr();}
function selW(w){CW=w;CQ=wkQ(w);rdr();}
function selD(i){CD=i;rdr();}
function setTS(s){TS=s;rdr();}
function jmpQ(q){VW='log';selQ(q);}

function showDebug(){
  let out='=== DEBUG: WEEK '+CW+' DATA ===\n\n';
  const wkData=DATA[CW]||{};
  PROG[CD].ex.forEach(e=>{
    const ex=wkData[e.id];
    if(!ex){out+=e.nm+': (no data)\n';return;}
    out+=e.nm+':\n';
    Object.keys(ex).sort().forEach(vi=>{
      const label=e.vars?e.vars[parseInt(vi)]||('var'+vi):'var'+vi;
      out+='  ['+label+'] (key='+vi+'): ';
      const sets=ex[vi];
      const setVals=[];
      for(let s=0;s<e.s;s++)setVals.push('S'+(s+1)+'='+(sets[s]||'-'));
      out+=setVals.join(', ')+'\n';
    });
    if(e.vars){
      const curVi=getVar(CW,e.id,true);
      out+='  → currently rendering: var '+curVi+' ('+e.vars[curVi]+')\n';
      // Check PR for last set
      const lastSi=e.s-1;
      const val=gv(CW,e.id,curVi,lastSi);
      if(val){
        const p=parse(val);
        if(p){
          const pr=chkPR(p,priorValsVar(CW,e.id,curVi));
          out+='  → S'+(lastSi+1)+' value="'+val+'" PR='+(pr?pr.t+' '+pr.d:'NONE')+'\n';
          const prior=priorValsVar(CW,e.id,curVi);
          const best=bestOf(prior);
          out+='  → prior best: '+(best?best.w+'kg x'+best.r:'none')+'\n';
        }
      }
    }
    out+='\n';
  });
  alert(out);
}

rdr();
</script>
