<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<meta name="theme-color" content="#0a0a08">
<title>Iron Log</title>
<style>
:root{
  /* Canvas */
  --bg:#060807;--bg2:#0c100e;--surf:rgba(255,255,255,0.028);--surf2:rgba(255,255,255,0.05);
  --line:rgba(255,255,255,0.06);--line2:rgba(255,255,255,0.1);
  /* Text */
  --t:#f4f7f5;--t2:#9aa39d;--t3:#5c655f;--t4:#3a423d;
  /* Emerald accent system */
  --acc:#34e0a1;--acc2:#10b981;--accd:#0a2e22;--accg:rgba(52,224,161,0.5);
  /* Achievement colors */
  --g:#34e0a1;--gs:#5bf0bb;--gbg:rgba(52,224,161,0.12);--gbd:rgba(52,224,161,0.4);
  --o:#ffcf5c;--os:#ffe08a;--obg:rgba(255,207,92,0.12);--obd:rgba(255,207,92,0.4);
  --red:#ff6b6b;
  /* Day hues */
  --d1:#34e0a1;--d2:#3b9eff;--d3:#ff9f45;--d4:#c77dff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
html,body{background:var(--bg);color:var(--t);font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;font-size:15px;min-height:100vh;overscroll-behavior:none;letter-spacing:-0.01em;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(70% 40% at 12% -8%,rgba(52,224,161,0.13),transparent 60%),
  radial-gradient(60% 38% at 100% 2%,rgba(59,158,255,0.09),transparent 55%),
  radial-gradient(90% 55% at 50% 108%,rgba(199,125,255,0.07),transparent 60%);}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.4;
  background-image:radial-gradient(rgba(255,255,255,0.018) 1px,transparent 1px);background-size:3px 3px;}
#app{position:relative;z-index:1;max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:120px;}

/* ───────── HEADER ───────── */
.hdr{padding:max(18px,env(safe-area-inset-top,18px)) 20px 16px;position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,rgba(6,8,7,0.92),rgba(6,8,7,0.7) 70%,transparent);
  backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);}
.hdr-top{display:flex;justify-content:space-between;align-items:center;}
.brand{display:flex;align-items:center;gap:12px;}
.bmark{width:40px;height:40px;border-radius:13px;position:relative;overflow:hidden;
  background:linear-gradient(140deg,#34e0a1,#0a8f64);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:0.5px;color:#04130d;
  box-shadow:0 6px 20px rgba(52,224,161,0.4),inset 0 1px 1px rgba(255,255,255,0.6),inset 0 -4px 8px rgba(0,0,0,0.25);}
.bmark::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.45),transparent);}
.btitle{font-size:21px;font-weight:800;letter-spacing:0.5px;line-height:1;background:linear-gradient(120deg,#f4f7f5 30%,#5bf0bb 55%,#f4f7f5 80%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:titleSheen 7s linear infinite;}
@keyframes titleSheen{to{background-position:200% center;}}
.bsub{font-size:9.5px;color:var(--acc);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;font-weight:700;opacity:0.85;}
.bkbtn{background:var(--surf2);border:1px solid var(--line2);color:var(--t2);padding:10px 14px;border-radius:13px;font-size:11px;font-family:inherit;font-weight:700;cursor:pointer;letter-spacing:0.5px;display:flex;align-items:center;gap:7px;transition:all 0.2s;}
.bkbtn:active{transform:scale(0.93);background:var(--surf2);}
.bkbtn svg{width:15px;height:15px;}

/* ───────── SEGMENTED NAV ───────── */
.nav{display:flex;gap:3px;padding:4px;background:rgba(0,0,0,0.3);border:1px solid var(--line);border-radius:16px;margin-top:16px;position:relative;}
.nbtn{flex:1;padding:12px 0;border-radius:12px;font-family:inherit;font-size:11.5px;font-weight:700;letter-spacing:0.8px;cursor:pointer;border:none;background:transparent;color:var(--t3);transition:color 0.25s;position:relative;display:flex;align-items:center;justify-content:center;gap:6px;z-index:1;}
.nbtn:active{transform:scale(0.97);}
.nbtn.on{color:#04130d;}
.nbtn.on::before{content:'';position:absolute;inset:0;border-radius:12px;background:linear-gradient(140deg,#5bf0bb,#10b981);box-shadow:0 4px 16px rgba(52,224,161,0.45),inset 0 1px 1px rgba(255,255,255,0.5);z-index:-1;animation:navPop 0.35s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes navPop{from{transform:scale(0.85);opacity:0.5;}to{transform:scale(1);opacity:1;}}
.nbi{display:inline-flex;width:15px;height:15px;}
.nbi svg{width:100%;height:100%;}

/* ───────── SECTION LABELS ───────── */
.seclbl{font-size:10.5px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;font-weight:700;padding:0 20px;margin:22px 0 11px;display:flex;justify-content:space-between;align-items:center;}

/* ───────── QUARTER PILLS ───────── */
.qbar{padding:18px 20px 4px;}
.qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.qbtn{padding:12px 0 11px;border-radius:15px;font-size:15px;font-weight:800;letter-spacing:0.5px;cursor:pointer;border:1px solid var(--line);background:var(--surf);color:var(--t3);text-align:center;transition:all 0.2s;}
.qbtn:active{transform:scale(0.95);}
.qdts{font-size:8.5px;letter-spacing:0.5px;color:var(--t4);margin-top:2px;font-weight:600;display:block;text-transform:uppercase;}
.qbtn.on{color:#fff;border-color:transparent;}
.qbtn.on .qdts{color:rgba(255,255,255,0.7);}
.qbtn.q1.on{background:linear-gradient(140deg,#34e0a1,#0a8f64);box-shadow:0 5px 18px rgba(52,224,161,0.4),inset 0 1px 1px rgba(255,255,255,0.4);}
.qbtn.q2.on{background:linear-gradient(140deg,#3b9eff,#1c6fd6);box-shadow:0 5px 18px rgba(59,158,255,0.4),inset 0 1px 1px rgba(255,255,255,0.4);color:#fff;}
.qbtn.q3.on{background:linear-gradient(140deg,#ff9f45,#e06f1c);box-shadow:0 5px 18px rgba(255,159,69,0.4),inset 0 1px 1px rgba(255,255,255,0.4);}
.qbtn.q4.on{background:linear-gradient(140deg,#c77dff,#9a4ad6);box-shadow:0 5px 18px rgba(199,125,255,0.4),inset 0 1px 1px rgba(255,255,255,0.4);}

/* ───────── WEEK GRID ───────── */
.wbar{padding:6px 20px 4px;}
.slbl{font-size:10.5px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.winfo{font-size:10px;color:var(--t4);font-weight:600;letter-spacing:0.5px;font-variant-numeric:tabular-nums;}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
.wbtn{aspect-ratio:1;min-height:40px;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:var(--surf);color:var(--t3);display:flex;align-items:center;justify-content:center;position:relative;transition:all 0.15s;font-variant-numeric:tabular-nums;}
.wbtn:active{transform:scale(0.9);}
.wbtn.hd{color:var(--t2);}
.wbtn.hd::after{content:'';position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--accg);}
.wbtn.dim{opacity:0.32;}
.wbtn.on{color:#fff;border-color:transparent;font-weight:800;}
.wbtn.on::after{background:#fff!important;opacity:0.8;box-shadow:none;}
.wbtn.on.q1{background:linear-gradient(140deg,#34e0a1,#0a8f64);box-shadow:0 5px 16px rgba(52,224,161,0.45),inset 0 1px 1px rgba(255,255,255,0.4);}
.wbtn.on.q2{background:linear-gradient(140deg,#3b9eff,#1c6fd6);box-shadow:0 5px 16px rgba(59,158,255,0.45),inset 0 1px 1px rgba(255,255,255,0.4);}
.wbtn.on.q3{background:linear-gradient(140deg,#ff9f45,#e06f1c);box-shadow:0 5px 16px rgba(255,159,69,0.45),inset 0 1px 1px rgba(255,255,255,0.4);}
.wbtn.on.q4{background:linear-gradient(140deg,#c77dff,#9a4ad6);box-shadow:0 5px 16px rgba(199,125,255,0.45),inset 0 1px 1px rgba(255,255,255,0.4);}

/* ───────── DAY TABS ───────── */
.dtabs{display:flex;gap:9px;padding:8px 20px 4px;overflow-x:auto;scrollbar-width:none;}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;padding:13px 18px;border-radius:16px;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:0.3px;cursor:pointer;border:1px solid var(--line);background:var(--surf);color:var(--t2);white-space:nowrap;min-height:48px;display:flex;align-items:center;gap:9px;transition:all 0.2s;}
.dtab:active{transform:scale(0.95);}
.dnum{font-size:17px;font-weight:800;opacity:0.4;font-variant-numeric:tabular-nums;}
.dtab.on{color:#fff;border-color:transparent!important;box-shadow:0 6px 20px rgba(0,0,0,0.35),inset 0 1px 1px rgba(255,255,255,0.25);}
.dtab.on .dnum{opacity:0.85;}

/* ───────── QUICK ACTIONS ───────── */
.glassbtn{background:var(--surf);border:1px solid var(--line);color:var(--t2);padding:13px 16px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;}
.glassbtn:active{transform:scale(0.96);background:var(--surf2);}
.gbi{display:inline-flex;width:15px;height:15px;}
.gbi svg{width:100%;height:100%;}

/* ───────── WEEK STATUS BANNER ───────── */
.pbanner{margin:20px 20px 0;padding:16px 18px;border-radius:20px;position:relative;overflow:hidden;display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(135deg,rgba(52,224,161,0.08),rgba(255,255,255,0.02));
  border:1px solid var(--line);box-shadow:0 8px 28px rgba(0,0,0,0.25);}
.ptag{font-size:13px;font-weight:800;letter-spacing:1.5px;line-height:1;}
.pwk{font-size:11px;color:var(--t3);margin-top:6px;font-weight:600;letter-spacing:0.5px;font-variant-numeric:tabular-nums;}
.ptip{font-size:11px;color:var(--t3);text-align:right;max-width:150px;line-height:1.5;font-weight:500;}

/* ───────── BODYWEIGHT ───────── */
.bwcard{margin:12px 20px 0;background:var(--surf);border:1px solid var(--line);border-radius:18px;padding:15px 18px;}
.bwrow{display:flex;align-items:center;gap:12px;}
.bwlbl{font-size:10.5px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;font-weight:700;flex:1;}
.bwinp{width:88px;background:rgba(0,0,0,0.3);border:1px solid var(--line2);color:var(--t);font-size:17px;font-weight:700;padding:9px 10px;border-radius:12px;outline:none;text-align:center;font-variant-numeric:tabular-nums;transition:all 0.2s;}
.bwinp:focus{border-color:var(--acc);box-shadow:0 0 0 4px rgba(52,224,161,0.15);}
.bwunit{font-size:13px;color:var(--t3);font-weight:700;}

/* ───────── EXERCISE CARDS ───────── */
.cards{padding:18px 20px;display:flex;flex-direction:column;gap:16px;}
.card{border-radius:24px;overflow:hidden;position:relative;
  background:linear-gradient(180deg,rgba(255,255,255,0.045),rgba(255,255,255,0.015));
  border:1px solid var(--line2);
  box-shadow:0 12px 36px rgba(0,0,0,0.4),inset 0 1px 1px rgba(255,255,255,0.08);
  animation:cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.card::before{content:'';position:absolute;top:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.cards .card:nth-child(1){animation-delay:.03s}.cards .card:nth-child(2){animation-delay:.08s}.cards .card:nth-child(3){animation-delay:.13s}.cards .card:nth-child(4){animation-delay:.18s}.cards .card:nth-child(5){animation-delay:.23s}.cards .card:nth-child(6){animation-delay:.28s}.cards .card:nth-child(7){animation-delay:.33s}.cards .card:nth-child(8){animation-delay:.38s}
.card.traps{background:linear-gradient(180deg,rgba(52,224,161,0.07),rgba(255,255,255,0.012));}
.card.abs{background:linear-gradient(180deg,rgba(199,125,255,0.07),rgba(255,255,255,0.012));border-color:rgba(199,125,255,0.18);}
.card.lg{background:linear-gradient(180deg,rgba(255,207,92,0.06),rgba(255,255,255,0.012));border-color:rgba(255,207,92,0.16);}
.chdr{padding:18px 20px 14px;}
.exnm{font-size:20px;font-weight:800;letter-spacing:-0.02em;color:var(--t);line-height:1.1;}
.exmeta{display:flex;gap:9px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.exnt{font-size:11.5px;color:var(--t3);flex:1;font-weight:500;line-height:1.4;}
.btag{font-size:8.5px;padding:3px 8px;border-radius:7px;letter-spacing:1.2px;font-weight:800;text-transform:uppercase;}
.btag.tr{background:var(--gbg);color:var(--gs);}
.btag.ab{background:rgba(199,125,255,0.15);color:#d8b3ff;}
.btag.lg{background:var(--obg);color:var(--os);}

/* ───────── VARIATION TOGGLE ───────── */
.vrow{display:flex;padding:0 20px 14px;gap:8px;}
.vbtn{flex:1;padding:11px 6px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:rgba(0,0,0,0.25);color:var(--t3);font-family:inherit;letter-spacing:0.3px;text-align:center;transition:all 0.2s;}
.vbtn:active{transform:scale(0.96);}
.vbtn.on{color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(0,0,0,0.3),inset 0 1px 1px rgba(255,255,255,0.3);}

/* ───────── SET GRID ───────── */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px 18px;}
.scol{padding:0;background:transparent;display:flex;flex-direction:column;}
.scol.dis{opacity:0.25;}
.scol.dis .slb2{color:var(--t4);}
.slb2{font-size:9.5px;color:var(--t3);text-align:center;margin-bottom:7px;letter-spacing:1px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:3px;text-transform:uppercase;}
.slb2.f{color:var(--red);}
.scol.dis .sinp{background:rgba(255,255,255,0.015);border-style:dashed;}
.sinp{width:100%;background:rgba(0,0,0,0.28);border:1px solid var(--line);color:var(--t);font-size:15px;font-weight:700;padding:13px 2px;outline:none;text-align:center;font-variant-numeric:tabular-nums;border-radius:14px;min-height:50px;transition:all 0.2s;}
.sinp::placeholder{color:var(--t4);font-size:10.5px;font-weight:500;}
.sinp:focus{border-color:var(--acc);background:rgba(52,224,161,0.06);box-shadow:0 0 0 4px rgba(52,224,161,0.15);}
.sinp.hv{border-color:var(--line2);background:rgba(255,255,255,0.04);}
.sinp.pw{color:var(--os);border-color:var(--o);background:linear-gradient(180deg,rgba(255,207,92,0.16),rgba(0,0,0,0.2));font-weight:800;box-shadow:0 0 18px rgba(255,207,92,0.3),inset 0 1px 1px rgba(255,224,138,0.3);animation:glowGold 2.6s ease-in-out infinite;}
.sinp.pr{color:var(--gs);border-color:var(--g);background:linear-gradient(180deg,rgba(52,224,161,0.16),rgba(0,0,0,0.2));font-weight:800;box-shadow:0 0 18px rgba(52,224,161,0.28),inset 0 1px 1px rgba(91,240,187,0.3);animation:glowGreen 2.6s ease-in-out infinite;}
@keyframes glowGold{0%,100%{box-shadow:0 0 14px rgba(255,207,92,0.25),inset 0 1px 1px rgba(255,224,138,0.3);}50%{box-shadow:0 0 26px rgba(255,207,92,0.5),inset 0 1px 1px rgba(255,224,138,0.4);}}
@keyframes glowGreen{0%,100%{box-shadow:0 0 14px rgba(52,224,161,0.22),inset 0 1px 1px rgba(91,240,187,0.3);}50%{box-shadow:0 0 26px rgba(52,224,161,0.45),inset 0 1px 1px rgba(91,240,187,0.4);}}
.scol.fail .sinp{border-color:rgba(255,107,107,0.3);}
.prl{font-size:8px;text-align:center;margin-top:6px;font-weight:800;letter-spacing:0.5px;padding:3px 3px;border-radius:6px;animation:prlPop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes prlPop{from{opacity:0;transform:scale(0.5);}to{opacity:1;transform:scale(1);}}
.prl.w{color:var(--os);background:rgba(255,207,92,0.14);}
.prl.r{color:var(--gs);background:rgba(52,224,161,0.14);}
.logtip{padding:6px 20px 18px;font-size:10.5px;color:var(--t3);text-align:center;line-height:1.8;font-weight:500;}

/* ───────── TOAST ───────── */
.toast{position:fixed;top:max(24px,env(safe-area-inset-top,24px));left:50%;transform:translateX(-50%) translateY(-120px);background:linear-gradient(135deg,#ffe08a,#ffcf5c);color:#1a1200;padding:14px 26px;border-radius:50px;font-size:14px;font-weight:800;letter-spacing:0.5px;z-index:9999;white-space:nowrap;box-shadow:0 12px 40px rgba(255,207,92,0.5);transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;gap:9px;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.rep{background:linear-gradient(135deg,#5bf0bb,#10b981);color:#04130d;box-shadow:0 12px 40px rgba(52,224,161,0.5);}

/* ───────── TRACKER ───────── */
.trhdr{padding:22px 20px 14px;}
.trtitle{font-size:32px;font-weight:800;letter-spacing:-0.03em;line-height:1;}
.trsub{font-size:12px;color:var(--t3);margin-top:7px;font-weight:500;}
.trctrl{display:flex;gap:8px;margin-top:16px;}
.trflt{padding:9px 16px;border-radius:11px;background:var(--surf);border:1px solid var(--line);color:var(--t3);font-size:11px;font-weight:700;letter-spacing:0.5px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.trflt:active{transform:scale(0.95);}
.trflt.on{background:linear-gradient(140deg,#34e0a1,#10b981);color:#04130d;border-color:transparent;box-shadow:0 4px 14px rgba(52,224,161,0.4);}
.sumbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px 20px 8px;}
.sumc{background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.015));border:1px solid var(--line2);border-radius:18px;padding:18px 8px;text-align:center;position:relative;overflow:hidden;animation:viewFade 0.5s ease-out both;box-shadow:0 8px 24px rgba(0,0,0,0.25);}
.sumc::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;}
.sumc.a::before{background:linear-gradient(90deg,transparent,var(--t2),transparent);}
.sumc.b::before{background:linear-gradient(90deg,transparent,var(--g),transparent);}
.sumc.c::before{background:linear-gradient(90deg,transparent,var(--o),transparent);}
.snum{font-size:32px;font-weight:800;line-height:1;letter-spacing:-0.02em;}
.slbl3{font-size:9.5px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-top:7px;font-weight:700;}
.tcards{padding:8px 20px 20px;}
.dslbl{font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:18px 0 9px;display:flex;align-items:center;gap:12px;}
.dslbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent);}
.tc{background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.012));border:1px solid var(--line);border-top:2.5px solid var(--line2);border-radius:20px;margin-bottom:12px;overflow:hidden;position:relative;}
.tchdr{padding:16px 16px 13px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.tcnm{font-size:16px;font-weight:800;letter-spacing:-0.01em;flex:1;line-height:1.2;}
.tbdgs{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.tbdg{font-size:11px;font-weight:800;padding:4px 10px;border-radius:9px;font-variant-numeric:tabular-nums;}
.tbdg.w{background:var(--obg);color:var(--os);border:1px solid var(--obd);box-shadow:0 0 12px rgba(255,207,92,0.15);}

const Y0=new Date(2025,11,29);

// Healing pass: clean empty variant slots
(function healData(){
  let changed=false;
  for(const w of Object.keys(DATA)){
    if(!DATA[w]||typeof DATA[w]!=='object')continue;
    for(const exId of Object.keys(DATA[w])){
      const ex=DATA[w][exId];
      if(!ex||typeof ex!=='object')continue;
      // Detect old format (no variant nesting): {0:"60kg x6", 1:"60kg x6"...}
      // vs new format: {0:{0:"60kg x6"...}, 1:{...}}
      const firstKey=Object.keys(ex)[0];
      if(firstKey!==undefined&&typeof ex[firstKey]==='string'){
        // Old format detected — wrap in variant 0
        DATA[w][exId]={'0':{...ex}};
        changed=true;
        continue;
      }
      // Remove empty variant slots
      for(const vi of Object.keys(ex)){
        const sets=ex[vi];
        if(!sets||typeof sets!=='object'){delete ex[vi];changed=true;continue;}
        const hasAny=Object.values(sets).some(v=>v&&v.toString().trim());
        if(!hasAny){delete ex[vi];changed=true;}
      }
      if(!Object.keys(ex).length){delete DATA[w][exId];changed=true;}
    }
    if(!Object.keys(DATA[w]).length){delete DATA[w];changed=true;}
  }
  if(changed){try{localStorage.setItem(KEY,JSON.stringify(DATA));}catch{}}
})();

// One-time migration: split tri_pushdown into Single Handle (var 0) vs Bar Attachment (var 1)
(function migrateTriPushdown(){
  const FLAG='ironlog_v6_tripushdown_split';
  if(localStorage.getItem(FLAG)==='1')return;
  let changed=false;
  for(const w of Object.keys(DATA)){
    if(!DATA[w]||!DATA[w].tri_pushdown||!DATA[w].tri_pushdown['0'])continue;
    const sets=DATA[w].tri_pushdown['0'];
    const newVar0={},newVar1={};
    for(const si of Object.keys(sets)){
      const val=sets[si];
      const mm=val&&val.match(/(\d+(?:\.\d+)?)/);
      if(!mm)continue;
      const wt=parseFloat(mm[1]);
      if(wt<18)newVar0[si]=val;
      else newVar1[si]=val;
    }
    const newEx={};
    if(Object.keys(newVar0).length)newEx['0']=newVar0;
    if(Object.keys(newVar1).length)newEx['1']=newVar1;
    if(Object.keys(newEx).length)DATA[w].tri_pushdown=newEx;
    else delete DATA[w].tri_pushdown;
    changed=true;
  }
  if(changed){try{localStorage.setItem(KEY,JSON.stringify(DATA));}catch{}}
  try{localStorage.setItem(FLAG,'1');}catch{}
})();

function setBW(w,kg){if(kg&&!isNaN(kg)){BW[w]=parseFloat(kg);}else{delete BW[w];}svBW();}

// Get the variation index used for a (week, exId)
// If user manually set one this session, use that. Otherwise infer from data.
function getVar(w,exId,hasVars){
  if(!hasVars)return 0;
  // PRIORITY 1: if data exists for this week, use the variant that actually has data
  if(DATA[w]&&DATA[w][exId]){
    const keys=Object.keys(DATA[w][exId]).filter(k=>{
      const sets=DATA[w][exId][k];
      return sets&&Object.values(sets).some(v=>v);
    });
    if(keys.length===1)return parseInt(keys[0]);
    if(keys.length>1){
      // Multiple variants have data — prefer CURVAR if it points to one of them
      if(CURVAR[w]&&CURVAR[w][exId]!==undefined&&keys.includes(String(CURVAR[w][exId])))return CURVAR[w][exId];
      return parseInt(keys[0]);
    }
  }
  // PRIORITY 2: no data yet — use CURVAR if set, else default to 0
  if(CURVAR[w]&&CURVAR[w][exId]!==undefined)return CURVAR[w][exId];
  return 0;
}
function setVar(w,exId,vi){if(!CURVAR[w])CURVAR[w]={};CURVAR[w][exId]=vi;svV();}

// Get a set value
function gv(w,exId,vi,si){
  return(DATA[w]&&DATA[w][exId]&&DATA[w][exId][vi]&&DATA[w][exId][vi][si])||'';
}

// Set a set value
function setV(w,exId,vi,si,val){
  // Defense-in-depth: always trim and treat empty as deletion
  val=(val==null?'':String(val).trim());
  if(!DATA[w])DATA[w]={};
  if(!DATA[w][exId])DATA[w][exId]={};
  if(!DATA[w][exId][vi])DATA[w][exId][vi]={};
  if(val){
    DATA[w][exId][vi][si]=val;
  }else{
    delete DATA[w][exId][vi][si];
    if(!Object.keys(DATA[w][exId][vi]).length)delete DATA[w][exId][vi];
    if(!Object.keys(DATA[w][exId]).length)delete DATA[w][exId];
    if(!Object.keys(DATA[w]).length)delete DATA[w];
  }
  sv();
}

// Get prior values for the SAME variation
function priorValsVar(w,exId,vi,fallbackId){
  const a=[];
  // Collect IDs to scan — primary + optional fallback
  const ids=[exId];
  if(fallbackId&&fallbackId!==exId)ids.push(fallbackId);
  for(let i=1;i<w;i++){
    for(const id of ids){
      if(DATA[i]&&DATA[i][id]&&DATA[i][id][vi]){
        Object.values(DATA[i][id][vi]).forEach(v=>a.push(v));
      }
    }
  }
  return a;
}

// Last logged set for SAME variation (placeholder hint)
function lastSet(w,exId,vi,si,fallbackId){
  for(let i=w-1;i>=1;i--){
    const v=gv(i,exId,vi,si);
    if(v)return v;
    // Check fallback if no data for primary
    if(fallbackId&&fallbackId!==exId){
      const fv=gv(i,fallbackId,vi,si);
      if(fv)return fv;
    }
  }
  return null;
}

// Did this week have any data for this exercise (any variation)?
function exHasData(w,exId){
  if(!DATA[w]||!DATA[w][exId])return false;
  for(const vData of Object.values(DATA[w][exId])){
    for(const v of Object.values(vData))if(v)return true;
  }
  return false;
}

function wkHas(w){
  if(!DATA[w])return false;
  for(const exData of Object.values(DATA[w])){
    for(const vData of Object.values(exData)){
      for(const v of Object.values(vData))if(v)return true;
    }
  }
  return false;
}

// Get all sets for an exercise+variation in a given week
function getWkSets(w,exId,vi,nSets){
  const arr=[];
  for(let s=0;s<nSets;s++)arr.push(gv(w,exId,vi,s));
  return arr;
}

function getExList(di){
  const d=PROG[di];
  return d.ex.map(e=>({...e,nm:(CUSTOM[d.id]&&CUSTOM[d.id][e.id]&&CUSTOM[d.id][e.id].nm)||e.nm,nt:(CUSTOM[d.id]&&CUSTOM[d.id][e.id]&&CUSTOM[d.id][e.id].nt)||e.nt}));
}

function doCSV(){
  let c='Week,Dates,Day,Exercise,Variation,Set,Entry,Weight(kg),Reps\n';
  for(let w=1;w<=52;w++){
    const dr=wkRange(w);
    if(BW[w]!==undefined)c+=`"${w}","${dr}","BODYWEIGHT","Bodyweight","","","${BW[w]}kg","${BW[w]}",""\n`;
    PROG.forEach(d=>d.ex.forEach(e=>{
      const variants=e.vars||[''];
      for(let vi=0;vi<variants.length;vi++){
        for(let s=0;s<e.s;s++){
          const v=gv(w,e.id,vi,s);
          if(!v)continue;
          const p=parse(v);
          c+=`"${w}","${dr}","${d.nm}","${e.nm}","${variants[vi]||''}","${s+1}","${v}","${p?p.w:''}","${p?p.r:''}"\n`;
        }
      }
    }));
  }
  const b=new Blob([c],{type:'text/csv'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download='ironlog_2026_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(u);
}

let TT=null;
// ── REST TIMER ──────────────────────────────────────
// ── REST TIMER (background-safe, one persistent interval) ──
let RT={open:false,running:false,preset:90,remain:90,endAt:0,done:false};
let RT_IV=null;
function rtFmt(s){s=Math.max(0,Math.round(s));const m=Math.floor(s/60),ss=s%60;return m+':'+String(ss).padStart(2,'0');}
// Single global ticker — runs for the life of the page, updates DOM directly.
// Independent of rdr() so it survives full re-renders (logging data mid-rest).
function rtTick(){
  if(RT.running){
    const left=(RT.endAt-Date.now())/1000;
    RT.remain=left;
    if(left<=0){
      RT.remain=0;RT.running=false;RT.done=true;
      RT.open=false;        // close the small modal if it was open
      rtAlert();
      rtShowDone();         // full-screen takeover
    }
  }
  rtPaint();
}
function rtEnsureTicker(){if(!RT_IV)RT_IV=setInterval(rtTick,250);}
// Update the DOM elements in place (no full re-render needed)
function rtPaint(){
  const fab=document.getElementById('rtfab');
  if(fab){
    fab.className='rtfab'+(RT.running?' run':'')+(RT.done?' done':'');
    if(RT.running||RT.done){fab.textContent=rtFmt(RT.remain);}
    else{fab.innerHTML=IC.timer;}
  }
  const el=document.getElementById('rttime');
  if(el){el.textContent=rtFmt(RT.remain);el.className='rttime'+(RT.remain<=0?' done':'');}
  const sb=document.getElementById('rtstartbtn');
  if(sb)sb.textContent=RT.running?'PAUSE':'START';
}
function rtOpen(){RT.done=false;RT.open=true;rdr();}
function rtClose(){RT.open=false;rdr();}
function rtSetPreset(sec){RT.preset=sec;RT.remain=sec;RT.running=false;RT.done=false;rtPaint();}
function rtStartPause(){
  if(RT.running){RT.running=false;}  // pause
  else{
    if(RT.remain<=0)RT.remain=RT.preset;
    RT.done=false;RT.running=true;
    RT.endAt=Date.now()+RT.remain*1000;
    rtEnsureTicker();
    try{const c=new (window.AudioContext||window.webkitAudioContext)();c.resume&&c.resume();}catch(e){}
  }
  rtPaint();
  // Only re-render the modal button label if modal open (cheap)
  if(RT.open)rdr();
}
function rtReset(){RT.running=false;RT.done=false;RT.remain=RT.preset;rtPaint();if(RT.open)rdr();}
function rtShowDone(){
  // Build the full-screen overlay once (avoid duplicates)
  if(document.getElementById('rtDoneScreen'))return;
  const mins=Math.floor(RT.preset/60),secs=RT.preset%60;
  const restedTxt=(mins?mins+'m ':'')+(secs?secs+'s':(mins?'':'0s'));
  const div=document.createElement('div');
  div.id='rtDoneScreen';
  div.className='rtdone-screen';
  div.innerHTML=`
    <div class="rtd-glow"></div>
    <div class="rtd-ring"></div><div class="rtd-ring r2"></div><div class="rtd-ring r3"></div>
    <div class="rtd-badge"><svg class="rtd-check" viewBox="0 0 100 100"><path d="M26 52 L44 70 L76 32"/></svg></div>
    <div class="rtd-title">REST COMPLETE</div>
    <div class="rtd-sub">Time to lift</div>
    <div class="rtd-rested">Rested ${restedTxt}</div>
    <div class="rtd-actions">
      <button class="rtd-btn go" onclick="rtDismissDone()">NEXT SET</button>
      <button class="rtd-btn again" onclick="rtDismissDone(true)">REST AGAIN</button>
    </div>`;
  document.body.appendChild(div);
  // keep pulsing the audio/vibration loop a couple times handled by rtAlert already
}
function rtDismissDone(restAgain){
  const div=document.getElementById('rtDoneScreen');
  RT.done=false;
  if(div){
    div.classList.add('out');
    setTimeout(()=>{if(div&&div.parentNode)div.parentNode.removeChild(div);
      if(restAgain){RT.remain=RT.preset;rtStartPause();}
      rtPaint();
    },340);
  }else{
    if(restAgain){RT.remain=RT.preset;rtStartPause();}
    rtPaint();
  }
}
function rtAlert(){
  try{if(navigator.vibrate)navigator.vibrate([300,120,300,120,300,120,400]);}catch(e){}
  rtBeep();
  setTimeout(rtBeep,900);
}
function rtBeep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    // three quick beeps
    [0,0.25,0.5].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=900;o.type='sine';
      g.gain.setValueAtTime(0.0001,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.35,ctx.currentTime+t+0.02);
      o.start(ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+t+0.18);
      o.stop(ctx.currentTime+t+0.2);
    });
  }catch(e){}
}
function showToast(t,d){const el=document.getElementById('toast');const lbl=d==='NEW!'?'NEW EXERCISE!':(t==='WT'?'WEIGHT PR':'REP PR');el.innerHTML=(t==='WT'?'🏆':'💪')+' '+lbl+' '+(d==='NEW!'?'':d);el.className='toast'+(t==='REP'?' rep':'');requestAnimationFrame(()=>el.classList.add('show'));clearTimeout(TT);TT=setTimeout(()=>el.classList.remove('show'),2800);}

  }

  if(RT.open){
    const presets=[60,90,120,150,180,240];
    let pre='';presets.forEach(s=>{pre+=`<button class="rtpre${RT.preset===s?' on':''}" onclick="rtSetPreset(${s})">${rtFmt(s)}</button>`;});

  }
  // Keep the live display in sync after every re-render, and make sure ticker is alive
  if(RT.running){rtEnsureTicker();}

  // Auto-center the selected week pill in the strip

}

      const val=gv(CW,e.id,vi,si);
      const p=parse(val);
      const pr=p?chkPR(p,priorValsVar(CW,e.id,vi,e.fallback)):null;
      const fail=e.allFail?true:(si===e.s-1);
      const ic=pr?(pr.t==='WT'?'sinp pw':'sinp pr'):val?'sinp hv':'sinp';
      const prl=pr?`<div class="prl ${pr.t==='WT'?'w':'r'}">★ ${pr.d}</div>`:'';
      let ph='kg×reps';
      if(!val){
        const h=lastSet(CW,e.id,vi,si,e.fallback);
        if(h)ph=h;
      }
      sets+=`<div class="scol${fail?' fail':''}"><div class="slb2${fail?' f':''}">S${si+1}${fail?' 🔥':''}</div><input class="${ic}" type="text" inputmode="text" autocomplete="off" placeholder="${esc(ph)}" value="${esc(val)}" onchange="hi('${e.id}',${vi},${si},this.value,${e.fallback?`'${e.fallback}'`:'undefined'})" onfocus="this.select()"/>${prl}</div>`;
    }
    sets+='</div>';

    cards+=`<div class="card ${cc}"><div class="chdr"><div class="exnm">${e.nm}</div><div class="exmeta">${badge}<span class="exnt">${e.nt}</span></div></div>${varRow}${sets}</div>`;
  });
  app.innerHTML+=cards+'</div>';
  app.innerHTML+=`<div class="logtip">🔥 last set to failure · <span style="color:var(--os)">★</span> wt PR · <span style="color:var(--gs)">★</span> rep PR · Toggle variation to switch weights</div>`;
}

function selectVar(w,exId,vi){
  setVar(w,exId,vi);
  rdr();
}

function rTr(app){
  app.innerHTML+=`<div class="trhdr"><div class="trtitle">PROGRESS</div><div class="trsub">Best set per week per variation · Scroll →</div><div class="trctrl"><button class="trflt${TS==='q'?' on':''}" onclick="setTS('q')">${QI[CQ].lb} Only</button><button class="trflt${TS==='y'?' on':''}" onclick="setTS('y')">Full Year</button></div></div>`;
  if(TS==='q')rQB(app);
  const[qs,qe]=TS==='q'?qWks(CQ):[1,52],wra=[];for(let w=qs;w<=qe;w++)wra.push(w);

  // Stats: count tracked/improved/PRs across all variations separately
  let prs=0,imp=0,tr=0;
  PROG.forEach(d=>d.ex.forEach(e=>{
    const variants=e.vars||[''];
    for(let vi=0;vi<variants.length;vi++){
      const wb=wra.map(w=>bestOf(getWkSets(w,e.id,vi,e.s)));
      const fl=wb.filter(Boolean);
      if(!fl.length)continue;
      tr++;
      const f=fl[0],l=fl[fl.length-1];
      if(l.w>f.w||l.r>f.r)imp++;
      wb.forEach((wd,wi)=>{if(!wd)return;const pr=wb.slice(0,wi).filter(Boolean).map(p=>p.w+'kg x'+p.r);if(chkPR(wd,pr))prs++;});
    }
  }));

  app.innerHTML+=`<div class="sumbar"><div class="sumc a"><div class="snum" style="color:var(--t)">${tr}</div><div class="slbl3">Tracked</div></div><div class="sumc b"><div class="snum" style="color:var(--gs)">${imp}</div><div class="slbl3">Improved</div></div><div class="sumc c"><div class="snum" style="color:var(--os)">${prs}</div><div class="slbl3">PRs Hit</div></div></div><div class="tcards">`;

  PROG.forEach(d=>{
    app.innerHTML+=`<div class="dslbl" style="color:${d.c}">${d.lb} — ${d.nm}</div>`;
    d.ex.forEach(e=>{
      const nm=(CUSTOM[d.id]&&CUSTOM[d.id][e.id]&&CUSTOM[d.id][e.id].nm)||e.nm;
      const variants=e.vars||[''];
      for(let vi=0;vi<variants.length;vi++){
        const wb=wra.map(w=>bestOf(getWkSets(w,e.id,vi,e.s)));
        const av=[];wra.forEach(w=>{for(let s=0;s<e.s;s++)av.push(gv(w,e.id,vi,s));});
        const ob=bestOf(av);
        const dispNm=variants[vi]?`${nm} — ${variants[vi]}`:nm;
        if(!ob)continue;  // Skip if no data for this variation
        const bdg=`<div class="tbdgs"><span class="tbdg w">${ob.w}kg</span><span class="tbdg r">×${ob.r}</span></div>`;
        let wh='<div class="twks">';
        wb.forEach((wd,wi)=>{const w=wra[wi],pr=wd?chkPR(wd,wb.slice(0,wi).filter(Boolean).map(p=>p.w+'kg x'+p.r)):null;if(!wd){wh+=`<div class="twk em"><div class="twl">W${w}</div><div class="twem">-</div></div>`;return;}const pc=pr?(pr.t==='WT'?'pw':'pr'):'',wc=pr?.t==='WT'?'var(--os)':pr?.t==='REP'?'var(--gs)':'var(--t)',rc=pr?(pr.t==='WT'?'#c8a000':'var(--g)'):'var(--t3)',st=pr?`<div class="twst" style="color:${pr.t==='WT'?'var(--os)':'var(--gs)'}">★${pr.d}</div>`:'';wh+=`<div class="twk ${pc}"><div class="twl">W${w}</div><div class="twwt" style="color:${wc}">${wd.w}</div><div class="twrp" style="color:${rc}">×${wd.r}</div>${st}</div>`;});
        wh+='</div>';
        app.innerHTML+=`<div class="tc" style="border-top-color:${d.c}"><div class="tchdr"><div class="tcnm">${dispNm}</div>${bdg}</div>${wh}</div>`;
      }
    });
  });
  app.innerHTML+='</div>';
}

function rYr(app){
  app.innerHTML+=`<div class="trhdr"><div class="trtitle">YEAR REVIEW</div><div class="trsub">2026 · Quarter by quarter</div></div>`;
  // Bodyweight trend
  const bwWeeks=Object.keys(BW).map(Number).sort((a,b)=>a-b);
  if(bwWeeks.length>=1){
    const first=BW[bwWeeks[0]],last=BW[bwWeeks[bwWeeks.length-1]];
    const delta=+((last-first).toFixed(1));
    const minBW=Math.min(...bwWeeks.map(w=>BW[w])),maxBW=Math.max(...bwWeeks.map(w=>BW[w]));
    const range=maxBW-minBW||1;
    // Build a mini sparkline using divs
    let spark='';
    const W=bwWeeks[bwWeeks.length-1],firstW=bwWeeks[0],span=(W-firstW)||1;
    bwWeeks.forEach(w=>{
      const pct=((BW[w]-minBW)/range)*100;
      const xpct=((w-firstW)/span)*100;
      spark+=`<div title="Wk${w}: ${BW[w]}kg" style="position:absolute;left:${xpct}%;bottom:${pct}%;width:7px;height:7px;border-radius:50%;background:var(--gs);transform:translate(-50%,50%);box-shadow:0 0 6px rgba(95,179,122,0.5)"></div>`;
    });
    app.innerHTML+=`<div style="margin:14px 16px 0;background:linear-gradient(135deg,#14201a,#14140f);border:1px solid var(--gbd);border-radius:14px;padding:16px"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px"><span style="font-size:11px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;font-weight:700">Bodyweight</span><span style="font-family:Impact,'Arial Narrow',sans-serif;font-size:24px;color:var(--gs)">${last}kg ${delta!==0?`<span style="font-size:13px;color:${delta>0?'var(--os)':'var(--gs)'}">${delta>0?'+':''}${delta}</span>`:''}</span></div><div style="position:relative;height:60px;margin-top:10px;border-bottom:1px solid var(--bd);border-left:1px solid var(--bd)">${spark}</div><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t4);margin-top:5px;font-family:'Courier New',monospace"><span>Wk${firstW}</span><span>${minBW}–${maxBW}kg</span><span>Wk${W}</span></div></div>`;
  }
  let h='<div style="padding:14px 16px 20px">';
  for(let q=1;q<=4;q++){
    const[qs,qe]=qWks(q),info=QI[q];let wl=0,prs=0,imp=0,tr=0;
    for(let w=qs;w<=qe;w++)if(wkHas(w))wl++;
    PROG.forEach(d=>d.ex.forEach(e=>{
      const variants=e.vars||[''];
      for(let vi=0;vi<variants.length;vi++){
        const wb=[];for(let w=qs;w<=qe;w++)wb.push(bestOf(getWkSets(w,e.id,vi,e.s)));
        const fl=wb.filter(Boolean);if(!fl.length)continue;
        tr++;const f=fl[0],l=fl[fl.length-1];if(l.w>f.w||l.r>f.r)imp++;
        wb.forEach((wd,wi)=>{if(!wd)return;if(chkPR(wd,wb.slice(0,wi).filter(Boolean).map(p=>p.w+'kg x'+p.r)))prs++;});
      }
    }));
    const tot=qe-qs+1,pct=Math.round(wl/tot*100);
    h+=`<div class="ycard" style="border-top:3px solid ${info.c}"><div class="yqhdr"><div><div class="yqtitle" style="color:${info.c}">${info.lb}</div><div class="yqdates">${info.dt} · Wks ${qs}-${qe}</div></div><button class="yvbtn" onclick="jmpQ(${q})">VIEW →</button></div><div class="ystats"><div class="ystat"><div class="ysnum" style="color:var(--t)">${wl}<span style="font-size:12px;color:var(--t3)">/${tot}</span></div><div class="yslbl">WEEKS</div></div><div class="ystat"><div class="ysnum" style="color:${info.c}">${pct}%</div><div class="yslbl">DONE</div></div><div class="ystat"><div class="ysnum" style="color:var(--gs)">${imp}</div><div class="yslbl">IMPROVED</div></div><div class="ystat"><div class="ysnum" style="color:var(--os)">${prs}</div><div class="yslbl">PRs</div></div></div></div>`;
  }
  let ywl=0,yprs=0,yimp=0,ytr=0;
  for(let w=1;w<=52;w++)if(wkHas(w))ywl++;
  PROG.forEach(d=>d.ex.forEach(e=>{
    const variants=e.vars||[''];
    for(let vi=0;vi<variants.length;vi++){
      const wb=[];for(let w=1;w<=52;w++)wb.push(bestOf(getWkSets(w,e.id,vi,e.s)));
      const fl=wb.filter(Boolean);if(!fl.length)continue;
      ytr++;const f=fl[0],l=fl[fl.length-1];if(l.w>f.w||l.r>f.r)yimp++;
      wb.forEach((wd,wi)=>{if(!wd)return;if(chkPR(wd,wb.slice(0,wi).filter(Boolean).map(p=>p.w+'kg x'+p.r)))yprs++;});
    }
  }));
  h+=`<div style="background:linear-gradient(135deg,#1a2a14,#14140f);border:1px solid var(--gbd);border-radius:13px;padding:16px;margin-top:6px"><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:18px;letter-spacing:3px;color:var(--gs);margin-bottom:12px;text-align:center">2026 TOTAL</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;text-align:center"><div><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:26px;color:var(--t)">${ywl}</div><div style="font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:3px;font-weight:700">WEEKS</div></div><div><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:26px;color:var(--t)">${ytr}</div><div style="font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:3px;font-weight:700">LIFTS</div></div><div><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:26px;color:var(--gs)">${yimp}</div><div style="font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:3px;font-weight:700">IMPROVED</div></div><div><div style="font-family:Impact,'Arial Narrow',sans-serif;font-size:26px;color:var(--os)">${yprs}</div><div style="font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:3px;font-weight:700">PRs</div></div></div></div></div>`;
  document.getElementById('app').innerHTML+=h;
}

function hi(exId,vi,si,val,fallbackId){
  setV(CW,exId,vi,si,val.trim());
  const p=parse(val.trim());
  if(p){const pr=chkPR(p,priorValsVar(CW,exId,vi,fallbackId));if(pr)showToast(pr.t,pr.d);}
  rdr();
}
function sw(v){VW=v;rdr();window.scrollTo({top:0,behavior:'smooth'});}
function selQ(q){CQ=q;const[qs,qe]=qWks(q);if(CW<qs||CW>qe)CW=qs;rdr();}
function cycleQ(){CQ=CQ%4+1;const[qs,qe]=qWks(CQ);CW=qs;rdr();}
function selW(w){CW=w;CQ=wkQ(w);rdr();}
function selD(i){CD=i;rdr();}
function setTS(s){TS=s;rdr();}
function jmpQ(q){VW='log';selQ(q);}

function showDebug(){
  let out='=== DEBUG: WEEK '+CW+' DATA ===\n\n';
  const wkData=DATA[CW]||{};
  PROG[CD].ex.forEach(e=>{
    const ex=wkData[e.id];
    if(!ex){out+=e.nm+': (no data)\n';return;}
    out+=e.nm+':\n';
    Object.keys(ex).sort().forEach(vi=>{
      const label=e.vars?e.vars[parseInt(vi)]||('var'+vi):'var'+vi;
      out+='  ['+label+'] (key='+vi+'): ';
      const sets=ex[vi];
      const setVals=[];
      for(let s=0;s<e.s;s++)setVals.push('S'+(s+1)+'='+(sets[s]||'-'));
      out+=setVals.join(', ')+'\n';
    });
    if(e.vars){
      const curVi=getVar(CW,e.id,true);
      out+='  → currently rendering: var '+curVi+' ('+e.vars[curVi]+')\n';
      // Check PR for last set
      const lastSi=e.s-1;
      const val=gv(CW,e.id,curVi,lastSi);
      if(val){
        const p=parse(val);
        if(p){
          const pr=chkPR(p,priorValsVar(CW,e.id,curVi));
          out+='  → S'+(lastSi+1)+' value="'+val+'" PR='+(pr?pr.t+' '+pr.d:'NONE')+'\n';
          const prior=priorValsVar(CW,e.id,curVi);
          const best=bestOf(prior);
          out+='  → prior best: '+(best?best.w+'kg x'+best.r:'none')+'\n';
        }
      }
    }
    out+='\n';
  });
  alert(out);
}

rdr();
</script>
